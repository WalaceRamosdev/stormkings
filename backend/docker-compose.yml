version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: storm_kings_postgres
    restart: always
    environment:
      POSTGRES_USER: storm_admin
      POSTGRES_PASSWORD: storm_password_123
      POSTGRES_DB: storm_kings_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: storm_kings_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@stormkings.gg
      PGADMIN_DEFAULT_PASSWORD: admin_password_123
    ports:
      - '5050:80'
    depends_on:
      - postgres

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storm_kings_api
    restart: always
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - DATABASE_URL=postgresql://storm_admin:storm_password_123@postgres:5432/storm_kings_db?schema=public
      - JWT_SECRET=storm_kings_secret_key_99
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - postgres

volumes:
  postgres_data:
